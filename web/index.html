<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07080d">
  <meta name="referrer" content="no-referrer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="STC Client">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>No-Comment STC Client</title>
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="launching login-media-active">
  <div class="ambient-media" aria-hidden="true">
    <img class="ambient-poster" src="/media/launch-poster.jpg" alt="">
    <video class="ambient-video" autoplay muted loop playsinline preload="metadata" poster="/media/launch-poster.jpg">
      <source src="/media/launch-background.mp4" type="video/mp4">
    </video>
    <div class="ambient-shade"></div>
  </div>
  <div id="app" aria-live="polite"></div>
  <div id="toast" class="toast" role="status"></div>
  <script src="/app.js" defer></script>
</body>
</html>
